<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Para Mariana</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 100px; margin: 0; }
        #corazon { font-size: 80px; margin-bottom: 20px; display: inline-block; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 15px; width: 80%; border-radius: 10px; font-size: 18px; }
        h1 { color: #ff3366; }
        p { color: #ff85a1; font-size: 20px; }
    </style>
</head>
<body>

    <div id="corazon">❤️</div><br>
    <input type="text" id="nombre" placeholder="Escribe tu nombre..."><br>
    <div id="mensaje"></div>

    <script>
        const input = document.getElementById('nombre');
        const m = document.getElementById('mensaje');

        input.oninput = function() {
            if (input.value.toLowerCase().trim() === "mariana") {
                m.innerHTML = "<h1>¡Hola, mi niña hermosa! ❤️</h1><p>Eres la persona más especial y quería decírtelo de una forma diferente, muy a mi estilo. :v</p>";
            } else {
                m.innerHTML = "";
            }
        };
    </script>

</body>
</html>
