    <script>
        document.getElementById('nameInput').oninput = function() {
            if(this.value.toLowerCase() === "mariana") {
                document.getElementById('message').innerHTML = `
                    <h1>¡Hola, mi niña hermosa! ❤️</h1>
                    <p style="color: #ff85a1;">Eres la persona más especial y quería 
                    decírtelo de una forma diferente, muy a mi estilo. :v</p>
                    <p style="font-size: 0.8em; color: #666;">(Sí, yo solito programé esto para ti)</p>
                `;
                document.getElementById('heart').style.animationDuration = "0.5s";
            } else {
                document.getElementById('message').innerHTML = "";
                document.getElementById('heart').style.animationDuration = "1.5s";
            }
        }
    </script>
