<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mariana</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        @keyframes latido {
            0% { transform: scale(1); }
            20% { transform: scale(1.2); }
            40% { transform: scale(1); }
        }
        #corazon { font-size: 80px; animation: latido 1.5s infinite; margin-bottom: 20px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; width: 250px; border-radius: 10px; text-align: center; font-size: 16px; }
        #mensaje { margin-top: 25px; min-height: 100px; }
        h1 { color: #ff3366; font-size: 22px; }
        p { color: #ff85a1; font-size: 18px; }
    </style>
</head>
<body>

    <div id="corazon">❤️</div>
    <input type="text" id="entrada" placeholder="Tu nombre aquí...">
    <div id="mensaje"></div>

    <script>
        const inputNombre = document.getElementById('entrada');
        const cajaMensaje = document.getElementById('mensaje');
        const corazonAnim = document.getElementById('corazon');

        inputNombre.addEventListener('input', () => {
            const valor = inputNombre.value.toLowerCase().trim();
            if (valor === "mariana") {
                cajaMensaje.innerHTML = "<h1>¡Hola, mi niña hermosa! ❤️</h1><p>Eres la persona más especial y quería decírtelo de una forma diferente, muy a mi estilo. :v</p><p style='font-size: 12px; color: #555;'>(Sí, yo solito programé esto para ti)</p>";
                corazonAnim.style.animationDuration = "0.5s";
            } else {
                cajaMensaje.innerHTML = "";
                corazonAnim.style.animationDuration = "1.5s";
            }
        });
    </script>

</body>
</html>
