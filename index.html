<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mariana</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 50px; overflow-x: hidden; }
        @keyframes latido {
            0% { transform: scale(1); }
            20% { transform: scale(1.2); }
            40% { transform: scale(1); }
        }
        #corazon { font-size: 80px; animation: latido 1.5s infinite; margin-bottom: 20px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; width: 250px; border-radius: 10px; text-align: center; font-size: 16px; outline: none; }
        #mensaje { margin-top: 25px; padding: 0 20px; }
        .confesion { margin-top: 100vh; margin-bottom: 100px; padding: 20px; opacity: 0; transition: 1.5s; }
        h1 { color: #ff3366; }
        p { color: #ff85a1; font-size: 18px; line-height: 1.6; }
        .beso { font-style: italic; font-weight: bold; color: #fff; text-shadow: 0 0 8px #ff3366; font-size: 20px; }
    </style>
</head>
<body>

    <div id="corazon">❤️</div>
    <input type="text" id="entrada" placeholder="Tu nombre aquí...">
    
    <div id="mensaje"></div>

    <div id="secreto" class="confesion">
        <p>La verdad...</p>
        <p>Tus ojos y tus pestañas me vuelven loco.</p>
        <p class="beso">Y si te soy sincero, mi mayor deseo es poder darte un beso algún día.</p>
        <p style="font-size: 12px; color: #444; margin-top: 40px;">Hecho con código para ti :v</p>
    </div>

    <script>
        const inputNombre = document.getElementById('entrada');
        const cajaMensaje = document.getElementById('mensaje');
        const secreto = document.getElementById('secreto');
        const corazonAnim = document.getElementById('corazon');

        inputNombre.addEventListener('input', () => {
            const valor = inputNombre.value.toLowerCase().trim();
            if (valor === "mariana") {
                cajaMensaje.innerHTML = "<h1>Hola, mi niña hermosa ❤️</h1><p>Eres la persona más especial. Baja un poquito... :v</p>";
                corazonAnim.style.animationDuration = "0.5s";
                secreto.style.opacity = "1";
                secreto.style.marginTop = "60px";
            } else {
                cajaMensaje.innerHTML = "";
                secreto.style.opacity = "0";
                secreto.style.marginTop = "100vh";
                corazonAnim.style.animationDuration = "1.5s";
            }
        });
    </script>

</body>
</html>
